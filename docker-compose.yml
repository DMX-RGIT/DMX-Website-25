services:
  db:
    image: postgres:16-alpine
    container_name: dmx-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dmx
      POSTGRES_PASSWORD: dmx_dev_2026
      POSTGRES_DB: dmx_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmx -d dmx_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
